name: Frontend Task
description: Frontend implementation task for the frontend repository
title: "[FE] "
body:
  - type: markdown
    attributes:
      value: |
        Create a frontend task packet.
        This issue should be implementation-focused and testable.

  - type: input
    id: parent-epic
    attributes:
      label: Parent Epic
      description: Related epic issue number or title
      placeholder: "#12 [EPIC] MVP Todo App"
    validations:
      required: true

  - type: input
    id: target-repo
    attributes:
      label: Target Repository
      description: Frontend repository name
      placeholder: "project-frontend"
      value: "project-frontend"
    validations:
      required: true

  - type: textarea
    id: problem-statement
    attributes:
      label: Problem Statement
      description: What problem does this frontend task solve?
      placeholder: Example- Users cannot view or create todos in the UI.
    validations:
      required: true

  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What should exist after this task is completed?
      placeholder: Example- A UI for listing and creating todos is implemented.
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: Write concrete and testable criteria
      placeholder: |
        - Todo list page is visible
        - User can submit a new todo
        - Validation messages are shown
        - Completed todos are visually distinguishable
        - API error state is handled
    validations:
      required: true

  - type: textarea
    id: out-of-scope
    attributes:
      label: Out of Scope
      description: Explicitly excluded from this task
      placeholder: |
        - Backend API implementation
        - Authentication screens
        - Notification center
    validations:
      required: true

  - type: textarea
    id: touched-modules
    attributes:
      label: Touched Modules
      description: Which frontend modules are expected to be affected?
      placeholder: |
        - pages/routes
        - components
        - hooks/services
        - api client
        - validation/form logic
    validations:
      required: true

  - type: textarea
    id: linked-docs
    attributes:
      label: Linked Docs
      description: Only the minimum required docs
      placeholder: |
        - docs/product/user-stories.md
        - docs/architecture/system-design.md
        - docs/execution/slice-plan.md
    validations:
      required: true

  - type: textarea
    id: expected-tests
    attributes:
      label: Expected Tests
      description: Which tests should be added or updated?
      placeholder: |
        - Component tests
        - Form validation tests
        - E2E/smoke test if available
    validations:
      required: true

  - type: dropdown
    id: owner-decision-needed
    attributes:
      label: Owner Decision Needed
      description: Is there any ambiguity that requires PO input?
      options:
        - No
        - Yes
    validations:
      required: true

  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies
      description: Any blocking dependency?
      placeholder: Example- Waiting for backend endpoint contract / No dependency
    validations:
      required: true

  - type: textarea
    id: done-evidence
    attributes:
      label: Done Evidence Expected
      description: What evidence must exist before review?
      placeholder: |
        - PR opened
        - Screenshots or short UI evidence
        - Tests added/updated
        - Acceptance criteria mapped in PR description
    validations:
      required: true